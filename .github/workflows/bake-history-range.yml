name: Bake historical playoff data (range)

# Manual trigger only. Loops scripts/fetch-historical.mjs over a range of
# seasons with a configurable inter-season cooldown so we stay polite with
# basketball-reference (already 2.5s between BR requests inside the bake;
# this adds extra breathing room between seasons). Skips seasons that are
# already baked unless `force` is true.
on:
  workflow_dispatch:
    inputs:
      start_season:
        description: "Start season (YYYY-YY, e.g. 2003-04)"
        required: true
        default: "2010-11"
      end_season:
        description: "End season (YYYY-YY, e.g. 2024-25)"
        required: true
        default: "2024-25"
      cooldown_seconds:
        description: "Seconds to sleep between seasons (BR politeness)"
        required: false
        default: "90"
      force:
        description: "Re-bake seasons even if a baked file already exists"
        required: false
        default: "false"

jobs:
  bake-range:
    runs-on: ubuntu-latest
    # GHA caps a single job at 6 hours. A typical season takes ~5 min on BR;
    # 15 seasons + cooldowns is comfortably inside this.
    timeout-minutes: 350
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Bake season range
        env:
          START_SEASON: ${{ inputs.start_season }}
          END_SEASON: ${{ inputs.end_season }}
          COOLDOWN: ${{ inputs.cooldown_seconds }}
          FORCE: ${{ inputs.force }}
        run: |
          set -u
          if ! [[ "$START_SEASON" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "::error::start_season must be YYYY-YY (got $START_SEASON)"; exit 1
          fi
          if ! [[ "$END_SEASON" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
            echo "::error::end_season must be YYYY-YY (got $END_SEASON)"; exit 1
          fi
          start_year="${START_SEASON%-*}"
          end_year="${END_SEASON%-*}"
          if (( end_year < start_year )); then
            echo "::error::end_season ($END_SEASON) is before start_season ($START_SEASON)"; exit 1
          fi
          failures=()
          for y in $(seq "$start_year" "$end_year"); do
            next=$((y + 1))
            yy=$(printf "%02d" $((next % 100)))
            season="${y}-${yy}"
            history_path="app/data/history-${season}.json"
            if [[ -f "$history_path" && "$FORCE" != "true" ]]; then
              echo "::group::Skipping $season (already baked; set force=true to re-bake)"
              echo "::endgroup::"
              continue
            fi
            echo "::group::Baking $season"
            if node scripts/fetch-historical.mjs "$season"; then
              echo "✓ $season"
            else
              echo "::warning::Bake failed for $season — continuing"
              failures+=("$season")
            fi
            echo "::endgroup::"
            # Only sleep if there's another season coming.
            if (( y < end_year )); then
              echo "Sleeping ${COOLDOWN}s before next season…"
              sleep "$COOLDOWN"
            fi
          done
          if (( ${#failures[@]} > 0 )); then
            echo "::warning::${#failures[@]} season(s) failed: ${failures[*]}"
          fi

      - name: Commit baked JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Bake historical playoff data (${{ inputs.start_season }} → ${{ inputs.end_season }})"
          file_pattern: "app/data/history-*.json app/data/leaderboard-*.json app/data/regular-season-*.json"
