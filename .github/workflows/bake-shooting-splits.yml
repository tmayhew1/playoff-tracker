name: Bake shooting splits (R)

# One-shot/backfill bake of per-player shot-distance zone splits (0-3, 3-10,
# 10-16, 16ft-3PT) from basketball-reference's per-season Shooting pages
# into app/data/shooting-<season>.json + the "zoneFG" league averages in
# app/data/league-averages.json — the data behind the zone breakdown under
# the 2-Pointers compare card and the Shot Zones tab. Runs on whatever ref
# it is dispatched from and commits the JSON back to that branch. Day-to-day
# freshness of the current season is handled by the daily backfill workflow.
on:
  # Push trigger: scoped to the feature branch + pipeline files so the full
  # bake starts on push without needing a manual dispatch (the automation
  # token can't dispatch workflows). Re-runs are cheap no-ops once the data
  # is present, and the bot's own data commit is [skip ci].
  push:
    branches: ["claude/playoff-tracker-shooting-splits-u3tqxl"]
    paths:
      - "scripts/R/fetch_shooting_splits.R"
      - "scripts/R/scrape_common.R"
      - ".github/workflows/bake-shooting-splits.yml"
  workflow_dispatch:
    inputs:
      start_season:
        description: "First season to bake (YYYY-YY, no earlier than 1996-97)"
        required: false
        default: "1996-97"
      end_season:
        description: "Last season to bake (YYYY-YY)"
        required: false
        default: "2025-26"
      force:
        description: "Refetch seasons already present"
        required: false
        default: "false"

concurrency:
  group: bake-shooting-splits-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bake:
    runs-on: ubuntu-latest
    # ~30 seasons x 2 pages x 2.5s politeness delay + parsing - well under this.
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install R packages
        run: Rscript -e 'install.packages(c("httr", "xml2", "jsonlite"))'

      - name: Fetch shooting splits
        run: >
          Rscript scripts/R/fetch_shooting_splits.R
          "${{ inputs.start_season || '1996-97' }}"
          "${{ inputs.end_season || '2025-26' }}"
          ${{ (inputs.force == 'true') && '--force' || '' }}

      - name: Commit baked JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Bake shooting splits (R) [skip ci]"
          file_pattern: "app/data/shooting-*.json app/data/league-averages.json"
